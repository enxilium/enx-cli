title: enx
description: A cross-platform developer workflow CLI
url: https://enx-cli.jacemu.xyz
baseurl: ""

remote_theme: just-the-docs/just-the-docs

color_scheme: catppuccin

# Search
search_enabled: true
search:
    heading_level: 2
    previews: 3
    preview_words_before: 5
    preview_words_after: 10
    rel_url: true
    button: false
    focus_shortcut_key: "k"

# Navigation
nav_enabled: true
heading_anchors: true

# Top-right link to GitHub
aux_links:
    "GitHub":
        - "https://github.com/enxilium/enx-cli"
aux_links_new_tab: true

# Footer
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/enxilium/enx-cli"
gh_edit_branch: "main"
gh_edit_source: "docs"
gh_edit_view_mode: "tree"

# Callouts
callouts:
    note:
        title: Note
        color: blue
    warning:
        title: Warning
        color: yellow
    tip:
        title: Tip
        color: green
    important:
        title: Important
        color: purple

# Build settings
exclude:
    - Gemfile
    - Gemfile.lock
    - node_modules
    - vendor
